# Yazi Keymap Configuration
# Managed via ~/dotfiles - symlinked to ~/.config/yazi/
# Docs: https://yazi-rs.github.io/docs/configuration/keymap

[manager]
keymap = [
  # Navigation
  { on = ["k"], run = "arrow -1", desc = "Move cursor up" },
  { on = ["j"], run = "arrow 1", desc = "Move cursor down" },
  { on = ["K"], run = "arrow -5", desc = "Move cursor up 5 lines" },
  { on = ["J"], run = "arrow 5", desc = "Move cursor down 5 lines" },
  { on = ["<C-u>"], run = "arrow -50%", desc = "Move cursor up half page" },
  { on = ["<C-d>"], run = "arrow 50%", desc = "Move cursor down half page" },
  { on = ["g", "g"], run = "arrow -99999999", desc = "Move cursor to top" },
  { on = ["G"], run = "arrow 99999999", desc = "Move cursor to bottom" },

  # Directory navigation
  { on = ["h"], run = "leave", desc = "Go to parent directory" },
  { on = ["l"], run = "enter", desc = "Enter directory" },
  { on = ["<Enter>"], run = "enter", desc = "Enter directory" },
  { on = ["<Backspace>"], run = "leave", desc = "Go to parent directory" },
  { on = ["H"], run = "back", desc = "Go to previous directory" },
  { on = ["L"], run = "forward", desc = "Go to next directory" },

  # Selection
  { on = ["<Space>"], run = ["select --state=none", "arrow 1"], desc = "Toggle selection and move down" },
  { on = ["v"], run = "visual_mode", desc = "Enter visual mode" },
  { on = ["V"], run = "visual_mode --unset", desc = "Enter visual mode (unset)" },
  { on = ["<C-a>"], run = "select_all --state=true", desc = "Select all" },
  { on = ["<C-r>"], run = "select_all --state=none", desc = "Invert selection" },

  # Operations
  { on = ["o"], run = "open", desc = "Open file" },
  { on = ["O"], run = "open --interactive", desc = "Open file interactively" },
  { on = ["y"], run = "yank", desc = "Yank (copy) file" },
  { on = ["x"], run = "yank --cut", desc = "Cut file" },
  { on = ["p"], run = "paste", desc = "Paste file" },
  { on = ["P"], run = "paste --force", desc = "Paste file (overwrite)" },
  { on = ["-"], run = "link", desc = "Create symlink (absolute)" },
  { on = ["_"], run = "link --relative", desc = "Create symlink (relative)" },
  { on = ["d"], run = "remove", desc = "Move to trash" },
  { on = ["D"], run = "remove --permanently", desc = "Delete permanently" },
  { on = ["a"], run = "create", desc = "Create file/directory" },
  { on = ["r"], run = "rename --cursor=before_ext", desc = "Rename file" },
  { on = [";"], run = "shell", desc = "Run shell command" },
  { on = [":"], run = "shell --block", desc = "Run shell command (block)" },
  { on = ["."], run = "hidden toggle", desc = "Toggle hidden files" },

  # Search & filter
  { on = ["s"], run = "search fd", desc = "Search with fd" },
  { on = ["S"], run = "search rg", desc = "Search with ripgrep" },
  { on = ["<C-s>"], run = "search none", desc = "Cancel search" },
  { on = ["z"], run = "plugin zoxide", desc = "Jump with zoxide" },
  { on = ["Z"], run = "plugin fzf", desc = "Jump with fzf" },
  { on = ["f"], run = "filter --smart", desc = "Filter files" },

  # Find
  { on = ["/"], run = "find --smart", desc = "Find" },
  { on = ["?"], run = "find --previous --smart", desc = "Find previous" },
  { on = ["n"], run = "find_arrow", desc = "Find next" },
  { on = ["N"], run = "find_arrow --previous", desc = "Find previous" },

  # Sorting
  { on = [",", "m"], run = "sort modified --dir-first", desc = "Sort by modified" },
  { on = [",", "M"], run = "sort modified --reverse --dir-first", desc = "Sort by modified (reverse)" },
  { on = [",", "c"], run = "sort created --dir-first", desc = "Sort by created" },
  { on = [",", "C"], run = "sort created --reverse --dir-first", desc = "Sort by created (reverse)" },
  { on = [",", "e"], run = "sort extension --dir-first", desc = "Sort by extension" },
  { on = [",", "E"], run = "sort extension --reverse --dir-first", desc = "Sort by extension (reverse)" },
  { on = [",", "a"], run = "sort alphabetical --dir-first", desc = "Sort alphabetically" },
  { on = [",", "A"], run = "sort alphabetical --reverse --dir-first", desc = "Sort alphabetically (reverse)" },
  { on = [",", "n"], run = "sort natural --dir-first", desc = "Sort naturally" },
  { on = [",", "N"], run = "sort natural --reverse --dir-first", desc = "Sort naturally (reverse)" },
  { on = [",", "s"], run = "sort size --dir-first", desc = "Sort by size" },
  { on = [",", "S"], run = "sort size --reverse --dir-first", desc = "Sort by size (reverse)" },

  # Tabs
  { on = ["t"], run = "tab_create --current", desc = "Create new tab" },
  { on = ["1"], run = "tab_switch 0", desc = "Switch to tab 1" },
  { on = ["2"], run = "tab_switch 1", desc = "Switch to tab 2" },
  { on = ["3"], run = "tab_switch 2", desc = "Switch to tab 3" },
  { on = ["4"], run = "tab_switch 3", desc = "Switch to tab 4" },
  { on = ["["], run = "tab_switch -1 --relative", desc = "Previous tab" },
  { on = ["]"], run = "tab_switch 1 --relative", desc = "Next tab" },
  { on = ["{"], run = "tab_swap -1", desc = "Swap tab left" },
  { on = ["}"], run = "tab_swap 1", desc = "Swap tab right" },

  # Copy paths
  { on = ["c", "c"], run = "copy path", desc = "Copy file path" },
  { on = ["c", "d"], run = "copy dirname", desc = "Copy directory path" },
  { on = ["c", "f"], run = "copy filename", desc = "Copy filename" },
  { on = ["c", "n"], run = "copy name_without_ext", desc = "Copy filename without extension" },

  # Bookmarks
  { on = ["m"], run = "bookmark_save", desc = "Save bookmark" },
  { on = ["'"], run = "bookmark_jump", desc = "Jump to bookmark" },
  { on = ["b", "d"], run = "bookmark_delete", desc = "Delete bookmark" },
  { on = ["b", "D"], run = "bookmark_delete --all", desc = "Delete all bookmarks" },

  # Help & quit
  { on = ["~"], run = "help", desc = "Open help" },
  { on = ["q"], run = "quit", desc = "Quit" },
  { on = ["Q"], run = "quit --no-cwd-file", desc = "Quit without saving cwd" },
  { on = ["<Esc>"], run = "escape", desc = "Cancel/escape" },
  { on = ["<C-c>"], run = "close", desc = "Close current tab" },

  # Quick access
  { on = ["g", "h"], run = "cd ~", desc = "Go to home" },
  { on = ["g", "c"], run = "cd ~/.config", desc = "Go to config" },
  { on = ["g", "d"], run = "cd ~/dev", desc = "Go to dev" },
  { on = ["g", "D"], run = "cd ~/Downloads", desc = "Go to Downloads" },
  { on = ["g", "t"], run = "cd ~/dotfiles", desc = "Go to dotfiles" },
]

[input]
keymap = [
  { on = ["<Esc>"], run = "close", desc = "Cancel input" },
  { on = ["<Enter>"], run = "close --submit", desc = "Submit input" },
  { on = ["<C-c>"], run = "close", desc = "Cancel input" },

  # Cursor movement
  { on = ["<Left>"], run = "move -1", desc = "Move cursor left" },
  { on = ["<Right>"], run = "move 1", desc = "Move cursor right" },
  { on = ["<C-a>"], run = "move -999", desc = "Move to beginning" },
  { on = ["<C-e>"], run = "move 999", desc = "Move to end" },
  { on = ["<C-b>"], run = "move -1", desc = "Move cursor left" },
  { on = ["<C-f>"], run = "move 1", desc = "Move cursor right" },

  # Text manipulation
  { on = ["<Backspace>"], run = "backspace", desc = "Delete previous character" },
  { on = ["<Delete>"], run = "backspace --under", desc = "Delete character under cursor" },
  { on = ["<C-h>"], run = "backspace", desc = "Delete previous character" },
  { on = ["<C-d>"], run = "backspace --under", desc = "Delete character under cursor" },
  { on = ["<C-u>"], run = "kill bol", desc = "Kill to beginning of line" },
  { on = ["<C-k>"], run = "kill eol", desc = "Kill to end of line" },
  { on = ["<C-w>"], run = "kill backward", desc = "Kill word backward" },

  # Paste
  { on = ["<C-y>"], run = "yank", desc = "Paste" },
]

[select]
keymap = [
  { on = ["<Esc>"], run = "close", desc = "Cancel selection" },
  { on = ["<C-c>"], run = "close", desc = "Cancel selection" },
  { on = ["<Enter>"], run = "close --submit", desc = "Submit selection" },
  { on = ["k"], run = "arrow -1", desc = "Move up" },
  { on = ["j"], run = "arrow 1", desc = "Move down" },
  { on = ["<Up>"], run = "arrow -1", desc = "Move up" },
  { on = ["<Down>"], run = "arrow 1", desc = "Move down" },
]

[tasks]
keymap = [
  { on = ["<Esc>"], run = "close", desc = "Hide task manager" },
  { on = ["q"], run = "close", desc = "Hide task manager" },
  { on = ["w"], run = "close", desc = "Hide task manager" },
  { on = ["k"], run = "arrow -1", desc = "Move up" },
  { on = ["j"], run = "arrow 1", desc = "Move down" },
  { on = ["<Enter>"], run = "inspect", desc = "Inspect task" },
  { on = ["x"], run = "cancel", desc = "Cancel task" },
]

[help]
keymap = [
  { on = ["<Esc>"], run = "close", desc = "Close help" },
  { on = ["q"], run = "close", desc = "Close help" },
  { on = ["k"], run = "arrow -1", desc = "Move up" },
  { on = ["j"], run = "arrow 1", desc = "Move down" },
]
