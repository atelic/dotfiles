set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc"

set -g history-limit 100000
set -g mouse on
set -g focus-events on
set -sg escape-time 10

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g allow-rename off
setw -g automatic-rename off

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Catppuccin Mocha palette ─────────────────────────────────────
# base=#1e1e2e  surface0=#313244  surface1=#45475a
# text=#cdd6f4  subtext0=#a6adc8  overlay0=#6c7086
# blue=#89b4fa  sapphire=#74c7ec  teal=#94e2d5
# green=#a6e3a1 yellow=#f9e2af    peach=#fab387
# mauve=#cba6f7 pink=#f5c2e7      red=#f38ba8

set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 60
set -g status-right-length 120

set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold]   #S #[bg=#313244,fg=#cba6f7]#[bg=#313244,fg=#cdd6f4]  #(whoami)@#h #[bg=#1e1e2e,fg=#313244]"

set -g status-right "#[fg=#313244,bg=#1e1e2e]#[bg=#313244,fg=#89b4fa]  #(uptime | awk -F'load averages: ' '{print $2}' | awk '{print $1}') #[bg=#313244,fg=#45475a]#[fg=#f9e2af] 󰃰 %a %b %d #[bg=#313244,fg=#45475a]#[fg=#fab387]  %H:%M #[bg=#1e1e2e,fg=#313244]"

setw -g window-status-format "#[bg=#1e1e2e,fg=#45475a]#[bg=#45475a,fg=#a6adc8] #I  #W #[bg=#1e1e2e,fg=#45475a]"
setw -g window-status-current-format "#[bg=#1e1e2e,fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e,bold] #I  #W #[bg=#1e1e2e,fg=#cba6f7]"
setw -g window-status-separator " "

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"

set -g message-style "bg=#f9e2af,fg=#1e1e2e,bold"
set -g message-command-style "bg=#fab387,fg=#1e1e2e,bold"

setw -g mode-style "bg=#fab387,fg=#1e1e2e,bold"

set -g display-time 2000
set -g display-panes-colour "#6c7086"
set -g display-panes-active-colour "#cba6f7"

set -g clock-mode-colour "#cba6f7"
set -g clock-mode-style 24
